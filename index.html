<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6657e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ระบบสุ่มที่นั่งนักเรียน 36 ที่นั่ง</title>
<style>
:root{
  --purple:#6657e8;
  --purple-dark:#4b3fc3;
  --blue:#3ab7ef;
  --ink:#1f2a44;
  --muted:#71809a;
  --line:#cfdaf5;
  --gold:#ffe89d;
  --gold-border:#ebb84c;
  --shadow:0 18px 45px rgba(73,78,160,.15);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 8% 0%,rgba(242,126,181,.16),transparent 25%),
    radial-gradient(circle at 95% 3%,rgba(58,183,239,.18),transparent 26%),
    linear-gradient(145deg,#f6f2ff,#eef8ff 55%,#f4fffd);
}
body{
  padding:
    env(safe-area-inset-top)
    env(safe-area-inset-right)
    env(safe-area-inset-bottom)
    env(safe-area-inset-left);
}
button{font:inherit}
.app{width:min(1280px,100%);margin:auto;padding:22px}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.brand{display:flex;align-items:center;gap:13px}
.logo{
  width:54px;height:54px;border-radius:17px;
  display:grid;place-items:center;font-size:28px;
  background:linear-gradient(145deg,#fff,#ebe7ff);
  box-shadow:0 9px 22px rgba(77,65,185,.14);
}
h1{
  margin:0;
  color:var(--purple-dark);
  font-size:clamp(1.65rem,4vw,2.7rem);
  line-height:1.05;
}
.subtitle{margin:7px 0 0;color:var(--muted)}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.control{
  border:0;
  min-height:56px;
  padding:12px 18px;
  border-radius:17px;
  font-weight:850;
  cursor:pointer;
  color:var(--purple-dark);
  background:#fff;
  box-shadow:0 9px 22px rgba(73,78,160,.11);
  transition:.18s ease;
}
.control:hover{transform:translateY(-2px)}
.control:active{transform:scale(.985)}
.control.primary{
  color:#fff;
  background:linear-gradient(135deg,var(--purple),#5e7bec 58%,var(--blue));
  box-shadow:0 13px 27px rgba(80,88,218,.24);
}
.control.sound-on{
  background:linear-gradient(135deg,#ecfff9,#e8faff);
  color:#137866;
}
.control.sound-off{
  background:#fff4f4;
  color:#a84747;
}
.control:disabled{opacity:.56;cursor:wait}

.classroom{
  position:relative;
  overflow:hidden;
  border-radius:30px;
  padding:30px 26px 28px;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(207,217,243,.95);
  box-shadow:var(--shadow);
}
.classroom::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 49.8%,rgba(102,87,232,.045) 50%,transparent 50.2%);
}
.board{
  position:relative;
  z-index:1;
  width:min(760px,75%);
  min-height:62px;
  margin:0 auto 38px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:900;
  font-size:clamp(1.05rem,2.3vw,1.4rem);
  background:linear-gradient(135deg,var(--purple-dark),var(--purple));
  box-shadow:inset 0 -5px 0 rgba(50,36,145,.16),0 13px 25px rgba(72,59,191,.18);
}
.seating{
  position:relative;
  z-index:1;
  width:min(940px,100%);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:44px;
}
.seat-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:58px;
}
.seat-group{
  display:grid;
  gap:12px;
}
.group-3{grid-template-columns:repeat(3,minmax(70px,100px))}
.group-2{grid-template-columns:repeat(2,minmax(70px,100px))}
.seat{
  aspect-ratio:1.18/1;
  border-radius:18px;
  background:linear-gradient(180deg,#fff,#f4f7ff);
  border:2px solid var(--line);
  display:grid;
  place-items:center;
  color:#22304e;
  font-size:clamp(.86rem,1.8vw,1.12rem);
  font-weight:900;
  box-shadow:0 9px 20px rgba(70,77,155,.12);
  transition:transform .18s ease,box-shadow .18s ease;
}
.seat:hover{
  transform:translateY(-2px);
  box-shadow:0 13px 24px rgba(70,77,155,.16);
}
.seat.special{
  background:linear-gradient(180deg,#fff9d8,var(--gold));
  border-color:var(--gold-border);
  color:#6a4a00;
}
.seat.shuffle{
  animation:cardFlip .58s cubic-bezier(.18,.84,.25,1) both;
}
@keyframes cardFlip{
  0%{transform:translateY(-24px) rotateX(82deg) scale(.8);opacity:.15}
  58%{transform:translateY(4px) rotateX(0) scale(1.06);opacity:1}
  100%{transform:translateY(0) scale(1)}
}
.status{
  position:relative;
  z-index:1;
  text-align:center;
  margin:24px 0 0;
  color:var(--muted);
  font-size:.92rem;
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(22px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(18px);
  opacity:0;
  pointer-events:none;
  padding:12px 18px;
  border-radius:999px;
  color:#fff;
  font-weight:850;
  background:rgba(31,42,68,.94);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  transition:.24s ease;
  z-index:30;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:900px){
  .app{padding:14px}
  .top{align-items:flex-start}
  .actions{width:100%}
  .control{flex:1}
  .classroom{padding:22px 12px 24px;border-radius:24px}
  .board{width:78%;margin-bottom:30px}
  .seating{gap:31px}
  .seat-row{gap:24px}
  .seat-group{gap:7px}
  .group-3{grid-template-columns:repeat(3,minmax(38px,1fr))}
  .group-2{grid-template-columns:repeat(2,minmax(38px,1fr))}
  .seat{border-radius:13px;border-width:1.5px;font-size:clamp(.72rem,2.5vw,.95rem)}
}
@media(max-width:560px){
  .logo{width:46px;height:46px;font-size:23px}
  .actions{display:grid;grid-template-columns:1fr 1fr}
  .control.primary{grid-column:1/-1}
  .control{min-height:52px;padding:10px 8px;font-size:.88rem}
  .classroom{padding:18px 8px 20px}
  .board{width:84%;min-height:54px;border-radius:16px}
  .seating{gap:24px}
  .seat-row{gap:12px}
  .seat-group{gap:5px}
  .seat{border-radius:10px}
}
@media print{
  body{background:#fff}
  .app{max-width:none;padding:0}
  .actions,.toast{display:none!important}
  .classroom{
    box-shadow:none;
    border:0;
    border-radius:0;
    padding:6mm 8mm;
  }
  .classroom::before{display:none}
  .board{
    background:#eee;
    color:#000;
    border:1.2pt solid #666;
    box-shadow:none;
    margin-bottom:9mm;
  }
  .seating{gap:10mm}
  .seat-row{gap:14mm}
  .seat-group{gap:3mm}
  .seat{
    box-shadow:none;
    border:1.1pt solid #777;
    font-size:12pt;
  }
  .seat.special{background:#eee;color:#000}
  .status{margin-top:7mm;color:#000}
  @page{size:A4 landscape;margin:8mm}
}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand">
      <div class="logo">🎲</div>
      <div>
        <h1>ระบบสุ่มที่นั่งนักเรียน</h1>
        <p class="subtitle">จำนวน 36 ที่นั่ง • ใช้เฉพาะเลขที่ 1–36</p>
      </div>
    </div>

    <div class="actions">
      <button class="control primary" id="randomBtn">🎲 สุ่มที่นั่ง</button>
      <button class="control" id="fullBtn">📺 เต็มจอ</button>
      <button class="control" id="printBtn">🖨️ พิมพ์ A4</button>
      <button class="control sound-on" id="soundBtn">🔊 เปิดเสียง</button>
    </div>
  </header>

  <section class="classroom" aria-label="ผังห้องเรียน">
    <div class="board">หน้าห้อง / กระดาน</div>
    <div class="seating" id="seating" aria-live="polite"></div>
    <p class="status" id="status">กด “สุ่มที่นั่ง” เพื่อเริ่มต้น</p>
  </section>
</main>

<div class="toast" id="toast">สุ่มที่นั่งเรียบร้อยแล้ว</div>

<script>
const rowGroups=[
  [3,3,2],
  [3,3,2],
  [3,3,2],
  [3,3,2],
  [2,2]
];

const highlighted=[19,21,24,36];
const leftOnly=[19,21,24];

const STORAGE_LAYOUT='randomSeat36v10Sound';
const STORAGE_TIME='randomSeat36TimeV10Sound';
const STORAGE_SOUND='randomSeat36SoundEnabled';

const seating=document.getElementById('seating');
const statusEl=document.getElementById('status');
const randomBtn=document.getElementById('randomBtn');
const soundBtn=document.getElementById('soundBtn');
const toast=document.getElementById('toast');

let soundEnabled=localStorage.getItem(STORAGE_SOUND)!=='false';
let audioContext=null;

function shuffle(items){
  const a=[...items];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildSeatMap(){
  const seats=[];
  let index=0;

  rowGroups.forEach((groups,row)=>{
    groups.forEach((groupSize,group)=>{
      for(let pos=0;pos<groupSize;pos++){
        seats.push({
          index:index++,
          row,
          group,
          pos,
          groupSize,
          hasRightNeighbor:pos<groupSize-1
        });
      }
    });
  });

  return seats;
}

const seats=buildSeatMap();

function rightNeighborIndex(index){
  const seat=seats[index];
  if(!seat || !seat.hasRightNeighbor) return -1;

  const neighbor=seats.find(s=>
    s.row===seat.row &&
    s.group===seat.group &&
    s.pos===seat.pos+1
  );

  return neighbor ? neighbor.index : -1;
}

function makeLayout(){
  for(let attempt=0;attempt<500;attempt++){
    const result=Array(36).fill(null);

    // เลขที่ 36 อยู่เฉพาะแถวที่ 1
    const firstRow=seats.filter(s=>s.row===0).map(s=>s.index);
    const pos36=firstRow[Math.floor(Math.random()*firstRow.length)];
    result[pos36]=36;

    // เลขที่ 19, 21, 24:
    // ไม่มีเพื่อนติดซ้าย และต้องมีเพื่อนติดขวา
    const eligible=shuffle(
      seats.filter(s=>{
        if(s.pos!==0 || !s.hasRightNeighbor || s.index===pos36){
          return false;
        }

        // เลขที่ 36 ห้ามอยู่ซ้ายติดกับ 19,21,24
        return rightNeighborIndex(pos36)!==s.index;
      }).map(s=>s.index)
    );

    shuffle(leftOnly).forEach((number,index)=>{
      result[eligible[index]]=number;
    });

    const remaining=shuffle(
      Array.from({length:36},(_,i)=>i+1)
        .filter(number=>![19,21,24,36].includes(number))
    );

    let remainingIndex=0;
    for(let i=0;i<result.length;i++){
      if(result[i]===null){
        result[i]=remaining[remainingIndex++];
      }
    }

    const rightOf36=rightNeighborIndex(pos36);
    if(rightOf36<0 || !leftOnly.includes(result[rightOf36])){
      return result;
    }
  }

  throw new Error('ไม่สามารถสร้างผังที่ตรงตามเงื่อนไขได้');
}

function isValid(values){
  if(!Array.isArray(values) || values.length!==36) return false;
  if(new Set(values).size!==36) return false;

  const pos36=values.indexOf(36);
  if(pos36<0 || seats[pos36].row!==0) return false;

  const rightOf36=rightNeighborIndex(pos36);
  if(rightOf36>=0 && leftOnly.includes(values[rightOf36])) return false;

  return leftOnly.every(number=>{
    const position=values.indexOf(number);

    return (
      position>=0 &&
      seats[position].pos===0 &&
      seats[position].hasRightNeighbor
    );
  });
}

function render(values,animate=false){
  seating.innerHTML='';
  let offset=0;

  rowGroups.forEach((groups,rowIndex)=>{
    const row=document.createElement('div');
    row.className='seat-row';
    row.setAttribute('aria-label',`แถวที่ ${rowIndex+1}`);

    groups.forEach(groupSize=>{
      const group=document.createElement('div');
      group.className='seat-group '+(groupSize===3?'group-3':'group-2');

      for(let pos=0;pos<groupSize;pos++){
        const number=values[offset++];
        const seat=document.createElement('div');

        seat.className=
          'seat'+
          (highlighted.includes(number)?' special':'')+
          (animate?' shuffle':'');

        seat.textContent=number;
        seat.style.animationDelay=((rowIndex*34)+(pos*28))+'ms';
        seat.setAttribute('aria-label','เลขที่ '+number);
        group.appendChild(seat);
      }

      row.appendChild(group);
    });

    seating.appendChild(row);
  });

  localStorage.setItem(STORAGE_LAYOUT,JSON.stringify(values));
}

function getAudioContext(){
  if(!audioContext){
    const AudioContextClass=window.AudioContext || window.webkitAudioContext;
    if(AudioContextClass){
      audioContext=new AudioContextClass();
    }
  }

  if(audioContext && audioContext.state==='suspended'){
    audioContext.resume();
  }

  return audioContext;
}

function playTone(frequency,duration=0.06,volume=0.045,type='sine'){
  if(!soundEnabled) return;

  const context=getAudioContext();
  if(!context) return;

  const oscillator=context.createOscillator();
  const gain=context.createGain();

  oscillator.type=type;
  oscillator.frequency.setValueAtTime(frequency,context.currentTime);

  gain.gain.setValueAtTime(volume,context.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    context.currentTime+duration
  );

  oscillator.connect(gain);
  gain.connect(context.destination);

  oscillator.start();
  oscillator.stop(context.currentTime+duration);
}

function playShuffleSound(step){
  const notes=[360,420,480,540,600,660];
  playTone(notes[step%notes.length],0.055,0.035,'square');
}

function playSuccessSound(){
  playTone(620,0.10,0.045,'sine');

  setTimeout(()=>{
    playTone(780,0.13,0.045,'sine');
  },90);

  setTimeout(()=>{
    playTone(980,0.17,0.05,'sine');
  },180);
}

function updateSoundButton(){
  soundBtn.textContent=soundEnabled?'🔊 เปิดเสียง':'🔇 ปิดเสียง';
  soundBtn.classList.toggle('sound-on',soundEnabled);
  soundBtn.classList.toggle('sound-off',!soundEnabled);
}

function showToast(message){
  toast.textContent=message;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1600);
}

function randomize(){
  randomBtn.disabled=true;
  let frame=0;

  // ปลดล็อกเสียงบน Safari/iPad จากการแตะปุ่มของผู้ใช้
  if(soundEnabled){
    getAudioContext();
  }

  const timer=setInterval(()=>{
    render(makeLayout(),false);
    playShuffleSound(frame);
    frame++;

    if(frame>=9){
      clearInterval(timer);

      const finalLayout=makeLayout();
      render(finalLayout,true);

      const now=new Date();
      const statusText='สุ่มล่าสุด: '+now.toLocaleString('th-TH',{
        dateStyle:'medium',
        timeStyle:'short'
      });

      statusEl.textContent=statusText;
      localStorage.setItem(STORAGE_TIME,statusText);

      playSuccessSound();
      showToast('สุ่มที่นั่งเรียบร้อยแล้ว');
      randomBtn.disabled=false;
    }
  },85);
}

randomBtn.addEventListener('click',randomize);

soundBtn.addEventListener('click',()=>{
  soundEnabled=!soundEnabled;
  localStorage.setItem(STORAGE_SOUND,String(soundEnabled));
  updateSoundButton();

  if(soundEnabled){
    getAudioContext();
    playTone(720,0.12,0.045,'sine');
    showToast('เปิดเสียงตอนสุ่มแล้ว');
  }else{
    showToast('ปิดเสียงตอนสุ่มแล้ว');
  }
});

document.getElementById('printBtn')
  .addEventListener('click',()=>window.print());

document.getElementById('fullBtn')
  .addEventListener('click',async()=>{
    try{
      if(!document.fullscreenElement){
        await document.documentElement.requestFullscreen();
      }else{
        await document.exitFullscreen();
      }
    }catch{
      alert('บน iPad ให้แตะปุ่มแชร์ แล้วเลือก “เพิ่มไปยังหน้าจอโฮม” เพื่อใช้งานแบบเต็มจอ');
    }
  });

updateSoundButton();

try{
  const saved=JSON.parse(localStorage.getItem(STORAGE_LAYOUT));

  if(isValid(saved)){
    render(saved);
    statusEl.textContent=
      localStorage.getItem(STORAGE_TIME) ||
      'โหลดผังล่าสุดแล้ว';
  }else{
    render(makeLayout());
  }
}catch{
  render(makeLayout());
}
</script>
</body>
</html>
