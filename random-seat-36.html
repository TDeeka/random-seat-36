<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สุ่มที่นั่งนักเรียน 36 ที่นั่ง</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #6d4aff;
      --primary-dark: #5536db;
      --accent: #efeaff;
      --fixed: #fff1ca;
      --fixed-border: #f0b429;
      --border: #d8dce6;
      --shadow: 0 10px 28px rgba(30, 41, 59, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans Thai", "Tahoma", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(109,74,255,.12), transparent 30%),
        radial-gradient(circle at 100% 100%, rgba(51,198,183,.10), transparent 28%),
        var(--bg);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 22px 46px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .badge {
      flex: 0 0 auto;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--primary-dark);
      font-weight: 700;
      white-space: nowrap;
    }

    .panel {
      background: rgba(255,255,255,.90);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(216,220,230,.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 22px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .rules {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: .95rem;
    }

    .rule-chip {
      background: var(--fixed);
      color: #7a4a00;
      border: 1px solid #f5cf71;
      border-radius: 999px;
      padding: 7px 11px;
      font-weight: 700;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 17px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      box-shadow: 0 7px 18px rgba(109,74,255,.28);
    }

    .btn-secondary {
      color: var(--text);
      background: #eef0f5;
    }

    .classroom {
      overflow-x: auto;
      padding: 4px 2px 16px;
    }

    .board {
      width: min(680px, 90%);
      margin: 0 auto 28px;
      padding: 12px;
      text-align: center;
      font-weight: 800;
      color: #334155;
      background: linear-gradient(180deg, #fff, #f1f5f9);
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      box-shadow: inset 0 -4px 0 rgba(148,163,184,.15);
    }

    .seat-grid {
      min-width: 960px;
      display: grid;
      grid-template-columns: repeat(8, minmax(92px, 1fr));
      column-gap: 24px;
      row-gap: 36px;
      align-items: start;
      padding: 12px 12px 22px;
    }

    .seat-wrap {
      text-align: center;
      position: relative;
    }

    .seat-label {
      display: block;
      margin-bottom: 8px;
      color: #444b57;
      font-size: .84rem;
      font-weight: 800;
    }

    .seat {
      width: 76px;
      height: 76px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: var(--card);
      border: 3px solid #1f2937;
      box-shadow: 0 5px 0 #d6d9e0;
      font-size: 1.52rem;
      font-weight: 900;
      transition: transform .28s ease, background .28s ease, border-color .28s ease;
    }

    .seat.fixed {
      background: var(--fixed);
      border-color: var(--fixed-border);
      color: #784600;
    }

    .seat.shuffle {
      animation: pop .42s ease;
    }

    @keyframes pop {
      0% { transform: scale(.82) rotate(-3deg); opacity: .45; }
      70% { transform: scale(1.08) rotate(1deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .legend {
      margin-top: 4px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: .9rem;
    }

    .legend-item { display: flex; align-items: center; gap: 8px; }
    .dot { width: 17px; height: 17px; border-radius: 5px; border: 2px solid #1f2937; background: white; }
    .dot.fixed-dot { background: var(--fixed); border-color: var(--fixed-border); }

    .status {
      min-height: 24px;
      margin-top: 10px;
      text-align: center;
      color: var(--primary-dark);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .page { padding: 18px 12px 34px; }
      .header { flex-direction: column; }
      .panel { border-radius: 16px; padding: 14px; }
      .toolbar { align-items: stretch; }
      .buttons { width: 100%; }
      button { flex: 1; }
    }

    @media print {
      body { background: white; }
      .page { max-width: none; padding: 0; }
      .header, .panel, .status { display: none !important; }
      .classroom { overflow: visible; }
      .seat-grid { min-width: 0; column-gap: 12px; row-gap: 24px; }
      .seat { box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>สุ่มที่นั่งนักเรียน 36 ที่นั่ง</h1>
        <p class="subtitle">ผังห้องเรียนตามตัวอย่าง พร้อมกำหนดเลขที่ 19, 21 และ 24 ให้อยู่ฝั่งซ้าย</p>
      </div>
      <div class="badge">36 ที่นั่ง</div>
    </header>

    <section class="panel toolbar" aria-label="ตัวควบคุม">
      <div class="rules">
        <span>เงื่อนไขคงที่:</span>
        <span class="rule-chip">แถว 1 ซ้ายสุด = 19</span>
        <span class="rule-chip">แถว 2 ซ้ายสุด = 21</span>
        <span class="rule-chip">แถว 3 ซ้ายสุด = 24</span>
      </div>
      <div class="buttons">
        <button class="btn-primary" id="shuffleBtn">🎲 สุ่มที่นั่ง</button>
        <button class="btn-secondary" id="resetBtn">↺ เรียงเลขใหม่</button>
        <button class="btn-secondary" id="printBtn">🖨️ พิมพ์ผัง</button>
      </div>
    </section>

    <section class="panel classroom">
      <div class="board">หน้าห้อง / กระดาน</div>
      <div id="seatGrid" class="seat-grid" aria-live="polite"></div>
      <div class="legend">
        <div class="legend-item"><span class="dot"></span> ที่นั่งสุ่มทั่วไป</div>
        <div class="legend-item"><span class="dot fixed-dot"></span> ที่นั่งกำหนดตำแหน่ง</div>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script>
    // ตำแหน่งที่นั่งในกริด 8 คอลัมน์ เพื่อให้ใกล้เคียงภาพตัวอย่าง
    const layout = [
      [1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8],
      [2,1],[2,2],[2,4],[2,5],[2,6],[2,7],[2,8],
      [3,1],[3,2],[3,3],[3,4],[3,5],[3,6],[3,7],[3,8],
      [4,1],[4,2],[4,3],[4,4],[4,5],[4,6],[4,7],[4,8],
      [5,1],[5,2],[5,4],[5,5],[5,6]
    ];

    // ดัชนีที่นั่งซ้ายสุดของ 3 แถวแรก และเลขที่ที่ต้องล็อกไว้
    const fixedAssignments = new Map([
      [0, 19],   // ที่นั่ง 1: แถว 1 ซ้ายสุด
      [8, 21],   // ที่นั่ง 9: แถว 2 ซ้ายสุด
      [15, 24]   // ที่นั่ง 16: แถว 3 ซ้ายสุด
    ]);

    const seatGrid = document.getElementById('seatGrid');
    const statusEl = document.getElementById('status');
    let currentAssignments = Array.from({ length: 36 }, (_, i) => i + 1);

    function render(assignments, animate = false) {
      seatGrid.innerHTML = '';

      layout.forEach(([row, col], index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'seat-wrap';
        wrapper.style.gridRow = row;
        wrapper.style.gridColumn = col;

        const label = document.createElement('span');
        label.className = 'seat-label';
        label.textContent = `ที่นั่ง ${index + 1}`;

        const seat = document.createElement('div');
        const isFixed = fixedAssignments.has(index);
        seat.className = `seat${isFixed ? ' fixed' : ''}${animate ? ' shuffle' : ''}`;
        seat.textContent = assignments[index];
        seat.title = isFixed ? 'ตำแหน่งที่กำหนดไว้' : 'ตำแหน่งที่สุ่มได้';

        if (animate) seat.style.animationDelay = `${Math.min(index * 12, 250)}ms`;

        wrapper.append(label, seat);
        seatGrid.appendChild(wrapper);
      });
    }

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function randomizeSeats() {
      const fixedNumbers = [...fixedAssignments.values()];
      const remainingNumbers = Array.from({ length: 36 }, (_, i) => i + 1)
        .filter(number => !fixedNumbers.includes(number));
      const shuffled = shuffleArray(remainingNumbers);

      const result = new Array(36);
      let pointer = 0;

      for (let i = 0; i < 36; i++) {
        result[i] = fixedAssignments.has(i)
          ? fixedAssignments.get(i)
          : shuffled[pointer++];
      }

      currentAssignments = result;
      render(currentAssignments, true);
      statusEl.textContent = `สุ่มเรียบร้อยแล้ว เวลา ${new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.`;
    }

    function resetSeats() {
      currentAssignments = Array.from({ length: 36 }, (_, i) => i + 1);
      render(currentAssignments, true);
      statusEl.textContent = 'กลับสู่การเรียงเลข 1–36 แล้ว';
    }

    document.getElementById('shuffleBtn').addEventListener('click', randomizeSeats);
    document.getElementById('resetBtn').addEventListener('click', resetSeats);
    document.getElementById('printBtn').addEventListener('click', () => window.print());

    render(currentAssignments);
  </script>
</body>
</html>
